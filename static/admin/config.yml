# local_backend allows the CMS to write directly to the local file system during development
local_backend: true

backend:
  name: github
  repo: creedhansing-ops/app-support-hub
  branch: main
  base_url: "https://app-support-hub.vercel.app" # Ganti dengan URL Vercel Anda yang sebenarnya jika berbeda
  auth_endpoint: "api/auth"

# These settings adjust how the generated files are structured
media_folder: "static/img"
public_folder: "/img"

collections:
  - name: "knowledge-base"
    label: "Knowledge Base"
    folder: "versioned_docs/version-1.0/01-knowledge-base"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "ID (Unique URL part)", name: "id", widget: "string"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Sidebar Position", name: "sidebar_position", widget: "number", required: false}
      - {label: "Content", name: "body", widget: "markdown"}
      - {label: "Attachment Diagram / File", name: "attachment", widget: "file", required: false}



  - name: "client-infrastructure"
    label: "Client Infrastructure"
    folder: "versioned_docs/version-1.0/03-client-infrastructure"
    path: "{{client_name}}/{{slug}}"
    create: true
    summary: "[{{client_name}}] {{title}}"
    # We want nested folders for clients like docs/03-client-infrastructure/bank-bca/topology.md
    slug: "{{slug}}" 
    fields:
      - {label: "Client Name (folder, e.g. bank-bca)", name: "client_name", widget: "string"}
      - {label: "ID (Unique URL part)", name: "id", widget: "string"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Sidebar Position", name: "sidebar_position", widget: "number", required: false}
      - {label: "Content", name: "body", widget: "markdown"}
      - {label: "Attachment Diagram / File", name: "attachment", widget: "file", required: false}

  - name: "sop-divisi"
    label: "SOP Divisi"
    folder: "versioned_docs/version-1.0/04-sop-divisi"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "ID (Unique URL part)", name: "id", widget: "string"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Sidebar Position", name: "sidebar_position", widget: "number", required: false}
      - {label: "Content", name: "body", widget: "markdown"}
      - {label: "Attachment Diagram / File", name: "attachment", widget: "file", required: false}
